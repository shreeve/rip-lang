<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rip UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>body { opacity: 0; } body.ready { opacity: 1; transition: opacity 200ms ease-in; }</style>
  <script defer src="/rip/rip.min.js" data-src="
      badge.rip
    " data-mount="WidgetGallery">
  </script>
  <script>
    let ready = false;
    const es = new EventSource('/watch');
    es.addEventListener('connected', () => ready ? location.reload() : (ready = true));
    es.addEventListener('reload', (e) => {
      if (e.data === 'styles') {
        const t = Date.now();
        document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
          if (new URL(link.href).origin !== location.origin) return;
          const url = new URL(link.href);
          url.searchParams.set('_r', t);
          link.href = url.toString();
        });
      } else {
        location.reload();
      }
    });
  </script>
</head>
<body>

<script type="text/rip">
export WidgetGallery = component
  offer _gallery := this
  darkMode := false

  mounted: ->
    if localStorage.getItem('rip-ui-theme') is 'dark'
      darkMode = true
      document.documentElement.dataset.theme = 'dark'
    document.addEventListener 'keydown', (e) =>
      if e.key is '/' and not (e.target.tagName in ['INPUT', 'TEXTAREA', 'SELECT']) and not e.target.isContentEditable
        e.preventDefault()
        @_navSection('', 'home')
        tocFilter = ''
        document.addEventListener 'keyup', (=>
          @_root?.querySelector('.toc-search')?.focus()
        ), { once: true }
    gc = document.querySelector('.grid-container')
    if gc
      gc.addEventListener 'mousedown', => setTimeout (=> @_updateGridRef()), 0
      gc.addEventListener 'keyup', => setTimeout (=> @_updateGridRef()), 0
    hash = location.hash.slice(1)
    if hash and document.getElementById(hash)
      tocActive = hash
      setTimeout =>
        document.getElementById(hash)?.scrollIntoView({ behavior: 'instant', block: 'start' })
        document.body.classList.add('ready')
      , 50
    else
      document.body.classList.add('ready')

  render
    .gallery
      .section id: "badge"
        .section-desc "Inline label with variant styles."
        .demo-row
          .demo-label "Variants"
          . style: "display:flex;gap:8px;align-items:center"
            Badge "Solid"
            Badge variant: "outline", "Outline"
            Badge variant: "subtle", "Subtle"
        .api
          dl
            dt "Props"
            dd
              code "@variant"
            dt "Data"
            dd
              code "$variant"
</script>

</body>
</html>
