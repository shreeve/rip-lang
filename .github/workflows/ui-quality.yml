name: UI Quality

on:
  pull_request:
    paths:
      - 'docs/dist/rip.min.js'
      - 'packages/ui/browser/**'
      - 'packages/ui/shared/**'
      - 'packages/ui/index.*'
      - '.github/workflows/ui-quality.yml'
  push:
    branches: [main, edge]
    paths:
      - 'docs/dist/rip.min.js'
      - 'packages/ui/browser/**'
      - 'packages/ui/shared/**'
      - 'packages/ui/index.*'
      - '.github/workflows/ui-quality.yml'

jobs:
  ui-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock', 'packages/ui/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        working-directory: packages/ui
        run: bunx playwright install --with-deps chromium firefox

      - name: Run UI browser matrix
        run: bun run --cwd packages/ui test:e2e -- --project=chromium --project=firefox

      - name: Run UI accessibility scan
        run: |
          set -o pipefail
          bun run test:ui:axe | tee ui-axe.log

      - name: Summarize UI axe findings
        if: always()
        run: |
          {
            echo "## UI Axe Findings"
            echo
            if rg -n "\\[axe:" ui-axe.log >/dev/null 2>&1; then
              echo "### Serious (non-blocking) findings"
              echo
              echo '```text'
              rg "\\[axe:" ui-axe.log
              echo '```'
            else
              echo "No serious findings logged."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/ui/playwright-report
            packages/ui/test-results
