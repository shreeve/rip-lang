# =============================================================================
# ripdb DuckDB extension — canonical build & publish via duckdb/extension-ci-tools.
#
# Replaces the earlier hand-rolled matrix. Using DuckDB's own reusable workflow
# means the extension is built in-tree against the pinned DuckDB source
# submodule with their build macros (build_loadable_extension / build_static_
# extension), which is the only supported path for extensions that subclass
# internal C++ catalog classes (TableCatalogEntry, SchemaCatalogEntry, etc.)
# and need to work across Linux and macOS release binaries.
#
# Scope: currently just osx_arm64 + linux_amd64 — the two platforms actively
# in use. Adding osx_amd64 / linux_arm64 / wasm in the future is a matter of
# dropping entries from `exclude_archs` below.
# =============================================================================

name: Build ripdb DuckDB extension

on:
  push:
    branches: [main, ripdb-extension-template]
    paths:
      - 'packages/db/extension/**'
      - '.github/workflows/ripdb-extension.yml'
    tags:
      - 'ripdb-extension-v*'
  workflow_dispatch:

concurrency:
  group: ripdb-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build via DuckDB's reusable distribution workflow.
  # The extension root is packages/db/extension/, but the reusable workflow
  # assumes the extension is at repo root. We work around that by using
  # `override_repository` to effectively treat this repo as-is and leaning on
  # `working_directory` handling inside the workflow.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      extension_name: ripdb
      duckdb_version: v1.5.2
      ci_tools_version: v1.5-variegata
      # For now: only build linux_amd64 in CI. Mac (osx_arm64) can be
      # verified locally on a developer machine much faster than in CI
      # (no DuckDB-from-source cold compile), so we skip it in CI until
      # the Linux build is green and we want a full release matrix.
      exclude_archs: 'osx_arm64;osx_amd64;linux_arm64;linux_amd64_musl;linux_arm64_musl;linux_amd64_gcc4;linux_arm64_gcc4;windows_amd64;windows_arm64;windows_amd64_mingw;windows_amd64_rtools;wasm_mvp;wasm_eh;wasm_threads'
